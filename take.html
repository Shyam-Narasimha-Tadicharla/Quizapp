<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QuizEngine — Take a Quiz</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 15px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f4f4f8;
      color: #1a1a2e;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 2rem 1rem;
    }
    button { font-family: inherit; cursor: pointer; }
    input, select { font-family: inherit; }

    :root {
      --accent:    #7b6ef6;
      --accent-hi: #9d92ff;
      --green:     #16a34a;
      --green-bg:  #dcfce7;
      --red:       #dc2626;
      --red-bg:    #fee2e2;
      --border:    #e2e2ec;
      --surface:   #ffffff;
      --ink-dim:   #6b7280;
    }

    .wrap { width: 100%; max-width: 620px; }

    /* header */
    .logo-bar {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 2rem;
    }
    .logo-mark {
      width: 34px; height: 34px; border-radius: 9px;
      background: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 17px; font-weight: 700; color: #fff;
    }
    .logo-text { font-size: 16px; font-weight: 700; color: #1a1a2e; }

    /* card */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2rem;
      box-shadow: 0 2px 12px rgba(0,0,0,.06);
    }
    .card-title {
      font-size: 18px; font-weight: 700; margin-bottom: .35rem;
    }
    .card-sub { font-size: 13px; color: var(--ink-dim); margin-bottom: 1.5rem; }

    /* fields */
    .field { margin-bottom: 1rem; }
    .field label {
      display: block; font-size: 12px; font-weight: 600;
      color: var(--ink-dim); margin-bottom: 5px; text-transform: uppercase; letter-spacing: .04em;
    }
    .field input {
      width: 100%; padding: 10px 12px;
      border: 1.5px solid var(--border); border-radius: 8px;
      font-size: 14px; color: #1a1a2e; outline: none;
      transition: border-color .15s;
      background: #fafafa;
    }
    .field input:focus { border-color: var(--accent); background: #fff; }

    /* buttons */
    .btn {
      display: inline-flex; align-items: center; justify-content: center; gap: 7px;
      padding: 10px 20px; border-radius: 8px;
      font-size: 14px; font-weight: 600;
      border: none; cursor: pointer;
      transition: opacity .15s, transform .1s;
    }
    .btn:active { transform: scale(.98); }
    .btn:disabled { opacity: .45; cursor: not-allowed; transform: none; }
    .btn-primary { background: var(--accent); color: #fff; }
    .btn-primary:hover:not(:disabled) { background: var(--accent-hi); }
    .btn-full { width: 100%; }

    .error-msg {
      font-size: 13px; color: var(--red);
      background: var(--red-bg);
      border: 1px solid #fca5a5;
      border-radius: 8px; padding: 9px 12px;
      margin-bottom: 1rem; display: none;
    }
    .error-msg.show { display: block; }

    /* spinner */
    .spinner {
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite; display: inline-block;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* quiz screen */
    .quiz-header { margin-bottom: 1.5rem; }
    .quiz-title  { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .quiz-meta   { font-size: 13px; color: var(--ink-dim); }

    .question-block {
      margin-bottom: 1.5rem;
      padding-bottom: 1.5rem;
      border-bottom: 1px solid var(--border);
    }
    .question-block:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .q-num {
      font-size: 11px; font-weight: 700; text-transform: uppercase;
      letter-spacing: .06em; color: var(--ink-dim); margin-bottom: 8px;
    }
    .q-text { font-size: 15px; font-weight: 500; line-height: 1.55; margin-bottom: .85rem; }

    .options { display: flex; flex-direction: column; gap: 7px; }
    .option {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 13px; border-radius: 9px;
      border: 1.5px solid var(--border);
      cursor: pointer; transition: border-color .15s, background .15s;
      font-size: 14px; user-select: none;
    }
    .option:hover  { border-color: var(--accent); background: #f5f3ff; }
    .option.selected { border-color: var(--accent); background: #ede9fe; }
    .option.correct  { border-color: var(--green); background: var(--green-bg); cursor: default; }
    .option.wrong    { border-color: var(--red);   background: var(--red-bg);   cursor: default; }
    .opt-letter {
      width: 26px; height: 26px; border-radius: 50%;
      background: #f0f0f5; color: #555;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 700; flex-shrink: 0;
    }
    .option.correct .opt-letter { background: var(--green); color: #fff; }
    .option.wrong   .opt-letter { background: var(--red);   color: #fff; }

    .submit-row { margin-top: 2rem; }

    /* results screen */
    .result-score {
      text-align: center; padding: 1.5rem 0;
    }
    .score-circle {
      width: 110px; height: 110px; border-radius: 50%;
      border: 6px solid var(--accent);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      margin: 0 auto 1rem;
    }
    .score-num  { font-size: 28px; font-weight: 800; color: var(--accent); }
    .score-den  { font-size: 13px; color: var(--ink-dim); }
    .score-pct  { font-size: 15px; font-weight: 600; margin-bottom: .25rem; }
    .score-msg  { font-size: 13px; color: var(--ink-dim); }

    .review-list { margin-top: 1.5rem; display: flex; flex-direction: column; gap: 10px; }
    .review-item {
      padding: 12px 14px; border-radius: 10px;
      border: 1.5px solid var(--border); font-size: 13px;
    }
    .review-item.correct { border-color: var(--green); background: var(--green-bg); }
    .review-item.wrong   { border-color: var(--red);   background: var(--red-bg); }
    .review-q { font-weight: 600; margin-bottom: 4px; color: #1a1a2e; }
    .review-a { color: var(--ink-dim); }

    /* timer */
    .timer-bar {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 8px 16px;
      border-radius: 99px;
      background: var(--surface);
      border: 1.5px solid var(--border);
      font-size: 14px; font-weight: 700;
      margin-bottom: 1.25rem;
      width: fit-content;
      margin-left: auto; margin-right: auto;
      transition: border-color .3s, color .3s;
    }
    .timer-bar.amber { border-color: #f59e0b; color: #f59e0b; }
    .timer-bar.red   { border-color: var(--red); color: var(--red); }
    .timer-icon { font-size: 15px; }

    /* screen toggling */
    .screen { display: none; }
    .screen.active { display: block; }
  </style>
</head>
<body>
<div class="wrap">

  <div class="logo-bar">
    <div class="logo-mark">Q</div>
    <div class="logo-text">QuizEngine</div>
  </div>

  <!-- ── Screen 1: Enter class name ── -->
  <div class="screen active" id="screen-class">
    <div class="card">
      <div class="card-title">Join a Quiz</div>
      <div class="card-sub">Enter the class code your teacher gave you</div>
      <div class="error-msg" id="class-error"></div>
      <div class="field">
        <label>Class code</label>
        <input type="text" id="class-input" placeholder="e.g. 10A" autocomplete="off" />
      </div>
      <button class="btn btn-primary btn-full" id="class-btn" onclick="lookupClass()">Continue →</button>
    </div>
  </div>

  <!-- ── Screen 2: Enter student details ── -->
  <div class="screen" id="screen-student">
    <div class="card">
      <div class="card-title" id="student-quiz-title">Quiz</div>
      <div class="card-sub" id="student-quiz-sub"></div>
      <div id="student-timer-notice" style="display:none;font-size:13px;color:#f59e0b;background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);border-radius:8px;padding:8px 12px;margin-bottom:1rem">
        ⏱ This quiz has a time limit of <strong id="student-timer-mins"></strong> minutes. The timer starts when you click Start.
      </div>
      <div class="error-msg" id="student-error"></div>
      <div class="field">
        <label>Your full name</label>
        <input type="text" id="student-name" placeholder="e.g. Rahul Sharma" autocomplete="name" />
      </div>
      <div class="field">
        <label>Roll number</label>
        <input type="text" id="student-roll" placeholder="e.g. 24" autocomplete="off" />
      </div>
      <button class="btn btn-primary btn-full" id="student-btn" onclick="startQuiz()">Start quiz →</button>
    </div>
  </div>

  <!-- ── Screen 3: Quiz ── -->
  <div class="screen" id="screen-quiz">
    <div class="card">
      <div class="quiz-header">
        <div class="quiz-title" id="quiz-title-display"></div>
        <div class="quiz-meta"  id="quiz-meta-display"></div>
      </div>
      <div class="timer-bar" id="timer-bar" style="display:none">
        <span class="timer-icon">⏱</span>
        <span id="timer-display">--:--</span>
      </div>
      <div id="question-area"></div>
      <div class="submit-row">
        <button class="btn btn-primary btn-full" id="submit-btn" onclick="submitQuiz()">Submit quiz</button>
      </div>
    </div>
  </div>

  <!-- ── Screen 4: Results ── -->
  <div class="screen" id="screen-result">
    <div class="card">
      <div class="result-score">
        <div class="score-circle">
          <div class="score-num" id="res-score"></div>
          <div class="score-den" id="res-total"></div>
        </div>
        <div class="score-pct" id="res-pct"></div>
        <div class="score-msg" id="res-msg"></div>
      </div>
      <div class="review-list" id="review-list"></div>
      <button class="btn btn-primary btn-full" onclick="window.location.href='/take'" style="margin-top:1.5rem">Exit</button>
    </div>
  </div>

</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
let _assignment    = null;   // full assignment object from /api/take
let _studentName   = '';
let _rollNumber    = '';
let _answers       = {};     // question_id → chosen display index
let _resultId      = null;   // from /start endpoint
let _timerInterval = null;   // setInterval handle
let _timerExpired  = false;

const LETTERS = ['A','B','C','D','E'];

function apiBase() { return window.location.origin; }

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}
function showError(elId, msg) {
  const el = document.getElementById(elId);
  el.textContent = msg; el.classList.add('show');
}
function clearError(elId) {
  document.getElementById(elId).classList.remove('show');
}

// ── sessionStorage helpers ─────────────────────────────────────────────────────
function _ssKey() { return 'qe-answers-' + (_assignment ? _assignment.assignment_id : ''); }

function saveAnswers() {
  if (!_assignment) return;
  try { sessionStorage.setItem(_ssKey(), JSON.stringify(_answers)); } catch {}
}

function loadAnswers() {
  if (!_assignment) return;
  try {
    const raw = sessionStorage.getItem(_ssKey());
    if (raw) _answers = JSON.parse(raw);
  } catch { _answers = {}; }
}

function clearAnswers() {
  if (!_assignment) return;
  try { sessionStorage.removeItem(_ssKey()); } catch {}
}

// ── Screen 1: class lookup ─────────────────────────────────────────────────────
document.getElementById('class-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookupClass();
});

async function lookupClass() {
  const code = document.getElementById('class-input').value.trim();
  if (!code) { showError('class-error', 'Please enter your class code.'); return; }
  clearError('class-error');

  const btn = document.getElementById('class-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Looking up…';

  try {
    const res  = await fetch(apiBase() + '/api/take/' + encodeURIComponent(code));
    const data = await res.json();
    if (!res.ok) { showError('class-error', data.error || 'Class not found.'); return; }

    _assignment = data;

    // Show timer notice if duration set
    const noticeEl = document.getElementById('student-timer-notice');
    if (data.duration_minutes) {
      document.getElementById('student-timer-mins').textContent = data.duration_minutes;
      noticeEl.style.display = '';
    } else {
      noticeEl.style.display = 'none';
    }

    document.getElementById('student-quiz-title').textContent = data.quiz_title;
    document.getElementById('student-quiz-sub').textContent =
      `Class: ${data.class_name} · ${data.questions.length} question${data.questions.length !== 1 ? 's' : ''}`;
    showScreen('screen-student');
    document.getElementById('student-name').focus();
  } catch {
    showError('class-error', 'Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.textContent = 'Continue →';
  }
}

// ── Screen 2: student details ──────────────────────────────────────────────────
document.getElementById('student-roll').addEventListener('keydown', e => {
  if (e.key === 'Enter') startQuiz();
});

async function startQuiz() {
  const name = document.getElementById('student-name').value.trim();
  const roll = document.getElementById('student-roll').value.trim();
  if (!name) { showError('student-error', 'Please enter your name.'); return; }
  if (!roll) { showError('student-error', 'Please enter your roll number.'); return; }
  clearError('student-error');

  const btn = document.getElementById('student-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span> Starting…';

  _studentName = name;
  _rollNumber  = roll;
  _resultId    = null;
  _timerExpired = false;

  // Restore any previously saved answers (refresh recovery)
  loadAnswers();

  try {
    // Call /start to record server-side start time and get remaining seconds
    const res  = await fetch(apiBase() + '/api/take/' + encodeURIComponent(_assignment.class_name) + '/start', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        assignment_id: _assignment.assignment_id,
        student_name:  name,
        roll_number:   roll,
      }),
    });
    const data = await res.json();
    if (!res.ok) { showError('student-error', data.error || 'Could not start quiz.'); return; }

    _resultId = data.result_id;

    document.getElementById('quiz-title-display').textContent = _assignment.quiz_title;
    document.getElementById('quiz-meta-display').textContent  =
      `${name} · Roll ${roll} · ${_assignment.class_name}`;

    renderAllQuestions();
    showScreen('screen-quiz');
    window.scrollTo(0, 0);

    // Start timer if duration set
    if (data.remaining_seconds != null) {
      startTimer(data.remaining_seconds);
    }
  } catch {
    showError('student-error', 'Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Start quiz →';
  }
}

// ── Timer ──────────────────────────────────────────────────────────────────────
function startTimer(remainingSeconds) {
  const bar     = document.getElementById('timer-bar');
  const display = document.getElementById('timer-display');
  bar.style.display = '';
  bar.className = 'timer-bar';

  let secs = Math.max(0, Math.round(remainingSeconds));
  const totalSecs = secs;

  function tick() {
    if (secs <= 0) {
      clearInterval(_timerInterval);
      _timerInterval = null;
      display.textContent = '00:00';
      bar.className = 'timer-bar red';
      _timerExpired = true;
      // Auto-submit
      submitQuiz(true);
      return;
    }

    const m = Math.floor(secs / 60);
    const s = secs % 60;
    display.textContent = String(m).padStart(2, '0') + ':' + String(s).padStart(2, '0');

    const pct = secs / totalSecs;
    if (pct <= 0.10) {
      bar.className = 'timer-bar red';
    } else if (pct <= 0.20) {
      bar.className = 'timer-bar amber';
    } else {
      bar.className = 'timer-bar';
    }

    secs--;
  }

  tick();
  _timerInterval = setInterval(tick, 1000);
}

function stopTimer() {
  if (_timerInterval) { clearInterval(_timerInterval); _timerInterval = null; }
}

// ── Screen 3: quiz ─────────────────────────────────────────────────────────────
function renderAllQuestions() {
  const questions = _assignment.questions;
  document.getElementById('question-area').innerHTML = questions.map((q, i) => `
    <div class="question-block" id="qblock-${q.id}">
      <div class="q-num">Question ${i + 1} of ${questions.length}</div>
      <div class="q-text">${escHtml(q.text)}</div>
      <div class="options" id="opts-${q.id}">
        ${q.options.map((opt, j) => `
          <div class="option ${_answers[q.id] === j ? 'selected' : ''}"
               onclick="selectOption('${q.id}', ${j})">
            <div class="opt-letter">${LETTERS[j]}</div>
            ${escHtml(opt)}
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function selectOption(questionId, idx) {
  _answers[questionId] = idx;
  saveAnswers();  // persist on every selection
  const optsEl = document.getElementById('opts-' + questionId);
  if (!optsEl) return;
  optsEl.querySelectorAll('.option').forEach((el, j) => {
    el.classList.toggle('selected', j === idx);
  });
}

async function submitQuiz(autoSubmit = false) {
  if (!autoSubmit) {
    const unanswered = _assignment.questions.filter(q => _answers[q.id] === undefined);
    if (unanswered.length > 0) {
      if (!confirm(`You have ${unanswered.length} unanswered question${unanswered.length > 1 ? 's' : ''}. Submit anyway?`)) return;
    }
  }

  stopTimer();

  const btn = document.getElementById('submit-btn');
  btn.disabled = true;
  btn.innerHTML = autoSubmit
    ? '<span class="spinner"></span> Time\'s up — submitting…'
    : '<span class="spinner"></span> Submitting…';

  const answersPayload = _assignment.questions.map(q => ({
    question_id:  q.id,
    chosen_index: _answers[q.id] ?? -1,
  })).filter(a => a.chosen_index !== -1);

  try {
    const res  = await fetch(apiBase() + '/api/take/' + encodeURIComponent(_assignment.class_name) + '/submit', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({
        assignment_id:  _assignment.assignment_id,
        student_name:   _studentName,
        roll_number:    _rollNumber,
        result_id:      _resultId,
        question_order: _assignment.question_order || [],
        option_orders:  _assignment.option_orders  || {},
        answers:        answersPayload,
      }),
    });
    const data = await res.json();
    if (!res.ok) { alert(data.error || 'Submission failed.'); return; }

    clearAnswers();
    showResults(data.score, data.total, data.percent, data.correct_answers || {}, data.option_orders || {});
  } catch {
    alert('Network error. Please try again.');
  } finally {
    btn.disabled = false;
    btn.innerHTML = 'Submit quiz';
  }
}

// ── Screen 4: results ──────────────────────────────────────────────────────────
function showResults(score, total, percent, correctAnswers, returnedOptionOrders) {
  document.getElementById('res-score').textContent = score;
  document.getElementById('res-total').textContent = `/ ${total}`;
  document.getElementById('res-pct').textContent   = `${percent}%`;

  let msg = '';
  if (percent >= 80)      msg = 'Excellent work!';
  else if (percent >= 60) msg = 'Good effort — keep practising.';
  else                    msg = 'Keep going — you\'ll improve with practice.';
  document.getElementById('res-msg').textContent = msg;

  const optOrders = returnedOptionOrders || _assignment.option_orders || {};

  const reviewHtml = _assignment.questions.map((q, i) => {
    const displayChosen   = _answers[q.id];
    const originalCorrect = correctAnswers[q.id];

    const order = optOrders[q.id] || q.options.map((_, j) => j);
    const displayCorrect = order.indexOf(originalCorrect);

    const originalChosen = displayChosen !== undefined
      ? (order[displayChosen] !== undefined ? order[displayChosen] : displayChosen)
      : undefined;

    const isCorrect  = originalChosen !== undefined && originalChosen === originalCorrect;
    const isWrong    = originalChosen !== undefined && originalChosen !== originalCorrect;
    const unanswered = displayChosen === undefined;

    const chosenLabel  = displayChosen  !== undefined ? `${LETTERS[displayChosen]}) ${escHtml(q.options[displayChosen])}`   : '—';
    const correctLabel = displayCorrect >= 0          ? `${LETTERS[displayCorrect]}) ${escHtml(q.options[displayCorrect])}` : '';

    return `
      <div class="review-item ${isCorrect ? 'correct' : isWrong ? 'wrong' : ''}">
        <div class="review-q">Q${i + 1}: ${escHtml(q.text)}</div>
        <div class="review-a">
          Your answer: <strong>${chosenLabel}</strong>
          ${isWrong    ? `<br>Correct answer: <strong style="color:var(--green)">${correctLabel}</strong>` : ''}
          ${unanswered ? `<span style="color:var(--ink-dim)"> (not answered)</span>` : ''}
        </div>
      </div>`;
  }).join('');

  document.getElementById('review-list').innerHTML = reviewHtml;
  showScreen('screen-result');
  window.scrollTo(0, 0);
}

// Pre-fill class code from URL param ?class=10A
(function() {
  const p = new URLSearchParams(window.location.search).get('class');
  if (p) {
    document.getElementById('class-input').value = p;
    lookupClass();
  }
})();

function escHtml(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
</body>
</html>
